name: Main branch

on:
  push:
    branches:
      - main

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout can't be included in the composite setup action, because the composite
      # action needs to be first checked out by the checkout action.
      - name: Check out code
        uses: actions/checkout@v5
        with:
          # Snapshot golden images are stored in Git LFS; fetch them so verifyPaparazziDebug compares
          # against real PNGs instead of LFS pointer files.
          lfs: true

      - name: Setup
        uses: ./.github/actions/setup

      - name: Preflight checks
        uses: ./.github/actions/basic-preflight-check
